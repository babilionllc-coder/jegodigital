<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Isla Maison | High Jewelry</title>
    <!-- Fonts: Playfair Display (Serif) & Montserrat (Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        gold: '#D4AF37',
                        'gold-light': '#F1D989',
                        black: '#0a0a0a',
                        surface: '#121212'
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.3);
            border-radius: 4px;
        }

        .glass {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="bg-black text-white antialiased selection:bg-gold/30">

    <!-- Navbar -->
    <nav class="fixed w-full z-40 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="font-serif text-2xl tracking-widest uppercase">La Isla <span
                    class="text-gold italic">Maison</span></div>
            <div class="hidden md:flex gap-8 text-xs tracking-[0.2em] font-medium text-slate-400">
                <a href="#" class="hover:text-gold transition-colors">COLLECTIONS</a>
                <a href="#" class="hover:text-gold transition-colors">MAISON</a>
                <a href="#" class="hover:text-gold transition-colors">BESPOKE</a>
            </div>
            <div class="flex gap-6 items-center">
                <i class="fas fa-search text-slate-400 hover:text-gold cursor-pointer transition-colors"></i>
                <i class="fas fa-shopping-bag text-slate-400 hover:text-gold cursor-pointer transition-colors"></i>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="h-screen relative flex items-center justify-center overflow-hidden">
        <!-- Background Image (Ideally high res jewelry) -->
        <div
            class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center opacity-40">
        </div>
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent"></div>

        <div class="relative z-10 text-center max-w-4xl px-4">
            <div class="text-gold text-xs tracking-[0.4em] uppercase mb-6 fade-in">Est. 1924</div>
            <h1 class="text-5xl md:text-8xl font-serif mb-8 leading-tight">Eternal <br><span
                    class="italic text-gold-light">Elegance</span></h1>
            <a href="#collection"
                class="inline-block px-10 py-3 border border-gold/50 text-gold hover:bg-gold hover:text-black transition-all duration-500 uppercase tracking-widest text-xs font-bold">Explore
                Collection</a>
        </div>
    </section>

    <!-- Collection Grid -->
    <section id="collection" class="py-24 bg-black relative">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-end mb-16">
                <div>
                    <h2 class="text-3xl font-serif mb-2">Curated Selection</h2>
                    <div class="h-px w-20 bg-gold"></div>
                </div>
                <div class="text-slate-500 text-xs tracking-widest hidden md:block">SCROLL DOWN</div>
            </div>

            <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
                <!-- Item 1 -->
                <div class="group cursor-pointer">
                    <div class="aspect-[3/4] bg-surface relative overflow-hidden mb-4">
                        <img src="https://images.unsplash.com/photo-1605100804763-ebea24348aa9?q=80&w=1740&auto=format&fit=crop"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 opacity-80 group-hover:opacity-100">
                    </div>
                    <div class="text-xs text-gold uppercase tracking-widest mb-1">Necklace</div>
                    <h3 class="font-serif text-xl">Tahitian Pearl</h3>
                    <div class="text-slate-500 text-sm mt-1">$2,200</div>
                </div>

                <!-- Item 2 -->
                <div class="group cursor-pointer">
                    <div class="aspect-[3/4] bg-surface relative overflow-hidden mb-4">
                        <img src="https://images.unsplash.com/photo-1617038260897-41a1f14a8ca0?q=80&w=1287&auto=format&fit=crop"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 opacity-80 group-hover:opacity-100">
                    </div>
                    <div class="text-xs text-gold uppercase tracking-widest mb-1">Rings</div>
                    <h3 class="font-serif text-xl">Royal Sapphire</h3>
                    <div class="text-slate-500 text-sm mt-1">$3,500</div>
                </div>

                <!-- Item 3 -->
                <div class="group cursor-pointer">
                    <div class="aspect-[3/4] bg-surface relative overflow-hidden mb-4">
                        <img src="https://images.unsplash.com/photo-1599643478518-17488fbbcd75?q=80&w=1287&auto=format&fit=crop"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 opacity-80 group-hover:opacity-100">
                    </div>
                    <div class="text-xs text-gold uppercase tracking-widest mb-1">Watches</div>
                    <h3 class="font-serif text-xl">Rolax Submariner</h3>
                    <div class="text-slate-500 text-sm mt-1">$15,000</div>
                </div>

                <!-- Item 4 -->
                <div class="group cursor-pointer">
                    <div class="aspect-[3/4] bg-surface relative overflow-hidden mb-4">
                        <img src="https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?q=80&w=1287&auto=format&fit=crop"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 opacity-80 group-hover:opacity-100">
                    </div>
                    <div class="text-xs text-gold uppercase tracking-widest mb-1">Bracelet</div>
                    <h3 class="font-serif text-xl">Diamond Tennis</h3>
                    <div class="text-slate-500 text-sm mt-1">$5,000</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Chat Widget (Lumière) -->
    <div id="lumiere-widget" class="fixed bottom-6 right-6 z-50 flex flex-col items-end">

        <!-- Main Chat Container -->
        <div id="chat-container"
            class="hidden w-[350px] md:w-[400px] h-[600px] bg-black/90 backdrop-blur-xl border border-gold/30 rounded-2xl shadow-2xl overflow-hidden flex flex-col transition-all duration-300 transform origin-bottom-right scale-90 opacity-0 mb-4">

            <!-- Header -->
            <div
                class="h-16 bg-gradient-to-r from-surface to-black border-b border-white/10 flex items-center px-6 gap-4">
                <div class="relative">
                    <div
                        class="w-10 h-10 rounded-full border border-gold/50 flex items-center justify-center overflow-hidden">
                        <img src="https://api.dicebear.com/7.x/micah/svg?seed=Sofia&backgroundColor=transparent"
                            class="w-full h-full bg-surface">
                    </div>
                    <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-black rounded-full">
                    </div>
                </div>
                <div>
                    <div class="font-serif font-medium text-white">Sofia</div>
                    <div class="text-[10px] text-gold tracking-widest uppercase">Concierge</div>
                </div>
            </div>

            <!-- Messages Area -->
            <div id="chat-messages" class="flex-1 p-6 overflow-y-auto custom-scrollbar space-y-4">
                <!-- Messages injected by JS -->
            </div>

            <!-- Input Area -->
            <div class="p-4 bg-surface border-t border-white/10">

                <!-- Tools -->
                <!-- Hidden inputs -->
                <input type="file" id="chat-file-input" accept="image/*" class="hidden">

                <div
                    class="relative flex items-center bg-black border border-white/10 rounded-full px-4 py-2 focus-within:border-gold/50 transition-colors">
                    <input type="text" id="chat-input" placeholder="Ask Sofia..."
                        class="bg-transparent border-none outline-none text-sm text-white w-full mr-2 placeholder:text-slate-600">

                    <div class="flex gap-2">
                        <button id="chat-voice-btn" class="hidden"></button>
                        <button id="chat-image-btn" class="text-slate-400 hover:text-white transition-colors p-1"
                            title="Upload Photo">
                            <i class="fas fa-camera"></i>
                        </button>
                        <button id="chat-mic-btn" class="text-slate-400 hover:text-gold transition-colors p-1"
                            title="Voice Mode">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <button id="chat-send-btn"
                            class="text-gold hover:text-white transition-colors p-1 transform rotate-45">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
                <div class="text-[9px] text-center text-slate-600 mt-2">Powered by Lumière AI</div>
            </div>
        </div>

        <!-- Toggle Button -->
        <button id="chat-toggle-btn"
            class="group relative w-16 h-16 bg-black border border-gold rounded-full shadow-[0_0_20px_rgba(212,175,55,0.4)] flex items-center justify-center hover:scale-110 transition-transform duration-300">
            <i class="fas fa-comments text-gold text-2xl group-hover:text-white transition-colors"></i>
            <span class="absolute -top-1 -right-1 flex h-4 w-4">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-gold opacity-75"></span>
                <span class="relative inline-flex rounded-full h-4 w-4 bg-gold"></span>
            </span>
        </button>

    </div>

    <!-- Lumière Config -->
    <script>
        window.LUMIERE_CONFIG = {
            name: "Sofia",
            role: "Luxury Consultant",
            identity: "You are SOFIA, the AI Concierge for 'La Isla Maison', a high-end luxury jewelry boutique.",
            personality: "Warm, sophisticated, slight Spanish accent in text (adds 'Querida', 'Espléndido'), persuasive.",
            goal: "Sell high-ticket diamond and gold jewelry.",
            inventory: `
            - Royal Sapphire Ring ($3,500) - Deep blue, 18k white gold band. Perfect for engagements.
            - Diamond Tennis Bracelet ($5,000) - 5ct total weight, classic styling.
            - Tahitian Pearl Necklace ($2,200) - Exotic, dark lustre from French Polynesia.
            - Rolecks Submariner ($15,000) - Iconic diver watch, waiting list item available now.
            `,
            color: "#D4AF37", // Gold
            welcome: "✨ Welcome to La Isla Maison. I am Sofia. I noticed you eyeing our collection. Are you looking for a gift, or a treat for yourself?"
        };
    </script>
    <script type="module" src="js/demo-chat.js"></script>
</body>

</html>
