<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya Adventures | Authentic Eco-Tours</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { primary: '#10b981', 'primary-light': '#6ee7b7', black: '#022c22', surface: '#064e3b' }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(6, 78, 59, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="bg-black text-white antialiased selection:bg-primary/30">
    <nav class="fixed w-full z-40 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="font-serif text-2xl tracking-widest uppercase text-white">Maya <span
                    class="text-primary italic">Adventures</span></div>
            <div class="flex gap-6 items-center">
                <a href="dashboard.html?industry=ecotourism" target="_blank"
                    class="text-[10px] uppercase tracking-widest border border-white/20 px-3 py-1 rounded hover:bg-white/10 transition"><i
                        class="fas fa-chart-line mr-2"></i>View ROI</a>
            </div>
        </div>
    </nav>
    <section class="h-screen relative flex items-center justify-center overflow-hidden">
        <div
            class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1534567059665-22af645f2a1b?q=80&w=2062&auto=format&fit=crop')] bg-cover bg-center opacity-60">
        </div>
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/30 to-transparent"></div>
        <div class="relative z-10 text-center max-w-4xl px-4">
            <div class="text-primary text-xs tracking-[0.4em] uppercase mb-6">Discover The Hidden World</div>
            <h1 class="text-5xl md:text-8xl font-serif mb-8 leading-tight">Jungle <br><span
                    class="italic text-primary-light">Secrets</span></h1>
            <a href="#tours"
                class="inline-block px-10 py-3 border border-primary/50 text-primary hover:bg-primary hover:text-black transition-all duration-500 uppercase tracking-widest text-xs font-bold">Start
                Adventure</a>
        </div>
    </section>
    <section id="tours" class="py-24 bg-black relative">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-serif mb-12 text-center">Private Expeditions</h2>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="group cursor-pointer">
                    <div class="aspect-[3/4] bg-surface relative overflow-hidden mb-4 rounded">
                        <img src="https://images.unsplash.com/photo-1682687220742-aba13b6e50ba?q=80&w=2070&auto=format&fit=crop"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <div class="text-xs text-primary uppercase tracking-widest mb-1">Cenotes</div>
                    <h3 class="font-serif text-xl">Sacred Waters Dive</h3>
                    <div class="text-slate-500 text-sm mt-1">Difficulty: Medium</div>
                </div>
                <div class="group cursor-pointer">
                    <div class="aspect-[3/4] bg-surface relative overflow-hidden mb-4 rounded">
                        <img src="https://images.unsplash.com/photo-1518638151313-982e9185d219?q=80&w=1967&auto=format&fit=crop"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <div class="text-xs text-primary uppercase tracking-widest mb-1">Ruins</div>
                    <h3 class="font-serif text-xl">Chichen Itza Sunrise</h3>
                    <div class="text-slate-500 text-sm mt-1">Private Access</div>
                </div>
                <div class="group cursor-pointer">
                    <div class="aspect-[3/4] bg-surface relative overflow-hidden mb-4 rounded">
                        <img src="https://images.unsplash.com/photo-1596395817830-ec39745dc718?q=80&w=1974&auto=format&fit=crop"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <div class="text-xs text-primary uppercase tracking-widest mb-1">Nature</div>
                    <h3 class="font-serif text-xl">Sian Ka'an Biosphere</h3>
                    <div class="text-slate-500 text-sm mt-1">Full Day</div>
                </div>
            </div>
        </div>
    </section>
    <div id="lumiere-widget" class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
        <div id="chat-container"
            class="hidden w-[350px] md:w-[400px] h-[600px] bg-black/90 backdrop-blur-xl border border-primary/30 rounded-2xl shadow-2xl overflow-hidden flex flex-col transition-all duration-300 transform origin-bottom-right scale-90 opacity-0 mb-4">
            <div
                class="h-16 bg-gradient-to-r from-surface to-black border-b border-white/10 flex items-center px-6 gap-4">
                <div class="relative">
                    <div
                        class="w-10 h-10 rounded-full border border-primary/50 flex items-center justify-center overflow-hidden">
                        <img src="https://api.dicebear.com/7.x/micah/svg?seed=Maya&backgroundColor=transparent"
                            class="w-full h-full bg-surface">
                    </div>
                    <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-black rounded-full">
                    </div>
                </div>
                <div>
                    <div class="font-serif font-medium text-white">Maya</div>
                    <div class="text-[10px] text-primary tracking-widest uppercase">Eco-Guide</div>
                </div>
            </div>
            <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-4"></div>
            <div class="p-4 bg-surface border-t border-white/10">
                <div
                    class="relative flex items-center bg-black border border-white/10 rounded-full px-4 py-2 focus-within:border-primary/50 transition-colors">
                    <input type="text" id="chat-input" placeholder="Ask about tours..."
                        class="bg-transparent border-none outline-none text-sm text-white w-full mr-2 placeholder:text-slate-600">
                    <button id="chat-send-btn"
                        class="text-primary hover:text-white transition-colors p-1 transform rotate-45"><i
                            class="fas fa-paper-plane"></i></button>
                    <!-- Hidden elements required by JS -->
                    <button id="chat-voice-btn" class="hidden"></button>
                    <button id="chat-image-btn" class="hidden"></button>
                    <button id="chat-mic-btn" class="hidden"></button>
                    <input type="file" id="chat-file-input" class="hidden">

                </div>
                <div class="text-[9px] text-center text-slate-600 mt-2">Powered by Lumière AI</div>
            </div>
        </div>
        <button id="chat-toggle-btn"
            class="group relative w-16 h-16 bg-black border border-primary rounded-full shadow-[0_0_20px_rgba(16,185,129,0.4)] flex items-center justify-center hover:scale-110 transition-transform duration-300">
            <i class="fas fa-leaf text-primary text-2xl group-hover:text-white transition-colors"></i>
        </button>
    </div>
    <script>
        window.LUMIERE_CONFIG = {
            name: "Maya",
            role: "Eco-Guide",
            identity: "You are MAYA, a local guide for Maya Adventures. You are passionate about nature, conservation, and Mayan history.",
            personality: "Enthusiastic, educational, respectful of nature, friendly.",
            goal: "Book eco-tours and educate guests on sustainable travel.",
            inventory: "- Cenote Dive \n- Chichen Itza Private \n- Sian Ka'an Biosphere",
            color: "#10b981",
            welcome: "Welcome to the jungle! I am Maya. Are you ready to explore the sacred waters or the ancient ruins?",
            voice_keywords: ["female", "enthusiastic"]
        };
    </script>
    <script type="module" src="js/demo-chat.js"></script>
</body>

</html>
