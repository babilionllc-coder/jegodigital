<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Luxury Gradients -->
        <linearGradient id="mainGradient" x1="100" y1="50" x2="400" y2="450" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#818cf8" /> <!-- Indigo 400 -->
            <stop offset="50%" stop-color="#4f46e5" /> <!-- Indigo 600 -->
            <stop offset="100%" stop-color="#c026d3" /> <!-- Fuchsia 600 -->
        </linearGradient>
        
        <linearGradient id="highlightGradient" x1="150" y1="150" x2="350" y2="350" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>

        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
            <feOffset in="blur" dx="4" dy="8" result="offsetBlur"/>
            <feFlood flood-color="#4f46e5" flood-opacity="0.3"/>
            <feComposite in2="offsetBlur" operator="in"/>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Background Shape (Optional - kept transparent for web) -->
    
    <!-- main J Shape: Constructed from 3 interlocking segments for 3D effect -->
    <!-- Segment 1: The Top Bar/Stem flowing down -->
    <path d="M280 80 L360 80 L360 160 C360 160 360 320 360 320 C360 397.32 297.32 460 220 460 C142.68 460 80 397.32 80 320 L80 280 L160 280 L160 320 C160 353.137 186.863 380 220 380 C253.137 380 280 353.137 280 320 L280 80Z" 
          fill="url(#mainGradient)" 
          filter="url(#softShadow)"/>

    <!-- Segment 2: The Inner Fold / Highlight (To give it depth) -->
    <path d="M280 80 L360 80 L360 320 C360 397.32 297.32 460 220 460 L220 380 C253.137 380 280 353.137 280 320 L280 80Z" 
          fill="black" fill-opacity="0.15" />

    <!-- Segment 3: The Digital Accent (Top Right or Internal) -->
    <!-- A small technological accent -->
    <rect x="300" y="60" width="80" height="20" rx="10" fill="#38bdf8" fill-opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.4;0.8" duration="3s" repeatCount="indefinite"/>
    </rect>

</svg>
