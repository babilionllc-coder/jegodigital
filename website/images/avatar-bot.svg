<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="eye-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 256) rotate(90) scale(256)">
            <stop stop-color="#3b82f6" />
            <stop offset="1" stop-color="#1d4ed8" stop-opacity="0" />
        </radialGradient>
        <filter id="robot-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="5" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Head Shape -->
    <rect x="128" y="128" width="256" height="256" rx="60" fill="#1e293b" stroke="#3b82f6" stroke-width="8" filter="url(#robot-glow)" />
    
    <!-- Face Screen -->
    <rect x="148" y="148" width="216" height="216" rx="40" fill="#0f172a" />
    
    <!-- Eyes -->
    <ellipse cx="200" cy="240" rx="30" ry="40" fill="#60a5fa" filter="url(#robot-glow)" />
    <ellipse cx="312" cy="240" rx="30" ry="40" fill="#60a5fa" filter="url(#robot-glow)" />
    
    <!-- Smile (Digital) -->
    <path d="M200 320 Q256 360 312 320" stroke="#60a5fa" stroke-width="8" stroke-linecap="round" filter="url(#robot-glow)" />
    
    <!-- Antenna -->
    <line x1="256" y1="128" x2="256" y2="80" stroke="#3b82f6" stroke-width="8" />
    <circle cx="256" cy="70" r="12" fill="#ef4444" filter="url(#robot-glow)">
        <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite" />
    </circle>
</svg>
