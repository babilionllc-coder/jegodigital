<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Charters | Cancun Luxury Yachts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { primary: '#06b6d4', 'primary-light': '#67e8f9', black: '#081c24', surface: '#0d2832' }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(13, 40, 50, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="bg-black text-white antialiased selection:bg-primary/30">

    <!-- Navbar -->
    <nav class="fixed w-full z-40 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="font-serif text-2xl tracking-widest uppercase text-white">Azure <span
                    class="text-primary italic">Charters</span></div>
            <div class="flex gap-6 items-center">
                <a href="dashboard.html?industry=yacht" target="_blank"
                    class="text-[10px] uppercase tracking-widest border border-white/20 px-3 py-1 rounded hover:bg-white/10 transition"><i
                        class="fas fa-chart-line mr-2"></i>View ROI</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="h-screen relative flex items-center justify-center overflow-hidden">
        <div
            class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1569263979104-a12916eb6049?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center opacity-50">
        </div>
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/30 to-transparent"></div>
        <div class="relative z-10 text-center max-w-4xl px-4">
            <div class="text-primary text-xs tracking-[0.4em] uppercase mb-6">Cancun • Tulum • Isla Mujeres</div>
            <h1 class="text-5xl md:text-8xl font-serif mb-8 leading-tight">The Ocean <br><span
                    class="italic text-primary-light">Is Yours</span></h1>
            <a href="#fleet"
                class="inline-block px-10 py-3 border border-primary/50 text-primary hover:bg-primary hover:text-black transition-all duration-500 uppercase tracking-widest text-xs font-bold">View
                Fleet</a>
        </div>
    </section>

    <!-- Fleet Grid -->
    <section id="fleet" class="py-24 bg-black relative">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-serif mb-12 text-center">Elite Fleet</h2>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Yacht 1 -->
                <div class="group cursor-pointer">
                    <div class="aspect-video bg-surface relative overflow-hidden mb-4 rounded">
                        <img src="https://images.unsplash.com/photo-1605281317010-fe5ffe79b9b7?q=80&w=2070&auto=format&fit=crop"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <div class="text-xs text-primary uppercase tracking-widest mb-1">55ft Flybridge</div>
                    <h3 class="font-serif text-xl">Azimut Atlantis</h3>
                    <div class="text-slate-500 text-sm mt-1">$2,500 / 4 hrs</div>
                </div>
                <!-- Yacht 2 -->
                <div class="group cursor-pointer">
                    <div class="aspect-video bg-surface relative overflow-hidden mb-4 rounded">
                        <img src="https://images.unsplash.com/photo-1567899378494-47b22a2ae96a?q=80&w=2070&auto=format&fit=crop"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <div class="text-xs text-primary uppercase tracking-widest mb-1">80ft Superyacht</div>
                    <h3 class="font-serif text-xl">Sunseeker Predator</h3>
                    <div class="text-slate-500 text-sm mt-1">$6,000 / 4 hrs</div>
                </div>
                <!-- Yacht 3 -->
                <div class="group cursor-pointer">
                    <div class="aspect-video bg-surface relative overflow-hidden mb-4 rounded">
                        <img src="https://images.unsplash.com/photo-1544154460-29a3e9c40212?q=80&w=1978&auto=format&fit=crop"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <div class="text-xs text-primary uppercase tracking-widest mb-1">Catamaran</div>
                    <h3 class="font-serif text-xl">Lagoon 450</h3>
                    <div class="text-slate-500 text-sm mt-1">$1,800 / 4 hrs</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Chat Widget -->
    <div id="lumiere-widget" class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
        <div id="chat-container"
            class="hidden w-[350px] md:w-[400px] h-[600px] bg-black/90 backdrop-blur-xl border border-primary/30 rounded-2xl shadow-2xl overflow-hidden flex flex-col transition-all duration-300 transform origin-bottom-right scale-90 opacity-0 mb-4">
            <div
                class="h-16 bg-gradient-to-r from-surface to-black border-b border-white/10 flex items-center px-6 gap-4">
                <div class="relative">
                    <div
                        class="w-10 h-10 rounded-full border border-primary/50 flex items-center justify-center overflow-hidden">
                        <img src="https://api.dicebear.com/7.x/micah/svg?seed=Leo&backgroundColor=transparent"
                            class="w-full h-full bg-surface">
                    </div>
                    <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-black rounded-full">
                    </div>
                </div>
                <div>
                    <div class="font-serif font-medium text-white">Capt. Leo</div>
                    <div class="text-[10px] text-primary tracking-widest uppercase">Yacht Concierge</div>
                </div>
            </div>
            <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-4"></div>
            <div class="p-4 bg-surface border-t border-white/10">
                <div
                    class="relative flex items-center bg-black border border-white/10 rounded-full px-4 py-2 focus-within:border-primary/50 transition-colors">
                    <input type="text" id="chat-input" placeholder="Ask about routes..."
                        class="bg-transparent border-none outline-none text-sm text-white w-full mr-2 placeholder:text-slate-600">
                    <button id="chat-send-btn"
                        class="text-primary hover:text-white transition-colors p-1 transform rotate-45"><i
                            class="fas fa-paper-plane"></i></button>
                    <!-- Hidden elements required by JS -->
                    <button id="chat-voice-btn" class="hidden"></button>
                    <button id="chat-image-btn" class="hidden"></button>
                    <button id="chat-mic-btn" class="hidden"></button>
                    <input type="file" id="chat-file-input" class="hidden">

                </div>
                <div class="text-[9px] text-center text-slate-600 mt-2">Powered by Lumière AI</div>
            </div>
        </div>
        <button id="chat-toggle-btn"
            class="group relative w-16 h-16 bg-black border border-primary rounded-full shadow-[0_0_20px_rgba(6,182,212,0.4)] flex items-center justify-center hover:scale-110 transition-transform duration-300">
            <i class="fas fa-ship text-primary text-2xl group-hover:text-white transition-colors"></i>
        </button>
    </div>

    <script>
        window.LUMIERE_CONFIG = {
            name: "Leo",
            role: "Yacht Captain",
            identity: "You are CAPTAIN LEO, the AI specialist for Azure Charters in Cancun.",
            personality: "Professional, experienced, uses nautical terms occasionally, extremely knowledgeable about the Caribbean sea.",
            goal: "Book high-end yacht charters and upsell catering/champagne packages.",
            inventory: "- Azimut 55 ($2.5k/4hr) \n- Sunseeker 80 ($6k/4hr) \n- Lagoon Catamaran ($1.8k/4hr)",
            color: "#06b6d4",
            welcome: "Welcome aboard Azure Charters. I am Captain Leo. Are you looking to explore Isla Mujeres or host a sunset party?",
            voice_keywords: ["male", "deep"]
        };
    </script>
    <script type="module" src="js/demo-chat.js"></script>
</body>

</html>
