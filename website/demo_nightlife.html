<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nocturne VIP | Tulum & Cancun Nightlife</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['Playfair Display', 'serif'] },
                    colors: { primary: '#a855f7', 'primary-light': '#d8b4fe', black: '#0f0714', surface: '#200e2b' }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(32, 14, 43, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="bg-black text-white antialiased selection:bg-primary/30">
    <nav class="fixed w-full z-40 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="font-serif text-2xl tracking-widest uppercase text-white">Nocturne <span
                    class="text-primary italic">VIP</span></div>
            <div class="flex gap-6 items-center">
                <a href="dashboard.html?industry=nightlife" target="_blank"
                    class="text-[10px] uppercase tracking-widest border border-white/20 px-3 py-1 rounded hover:bg-white/10 transition"><i
                        class="fas fa-chart-line mr-2"></i>View ROI</a>
            </div>
        </div>
    </nav>
    <section class="h-screen relative flex items-center justify-center overflow-hidden">
        <div
            class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1566737236500-c8ac43014a67?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center opacity-40">
        </div>
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/30 to-transparent"></div>
        <div class="relative z-10 text-center max-w-4xl px-4">
            <div class="text-primary text-xs tracking-[0.4em] uppercase mb-6">Access The Inaccessible</div>
            <h1 class="text-5xl md:text-8xl font-serif mb-8 leading-tight">Own The <br><span
                    class="italic text-primary-light">Night</span></h1>
            <a href="#clubs"
                class="inline-block px-10 py-3 border border-primary/50 text-primary hover:bg-primary hover:text-black transition-all duration-500 uppercase tracking-widest text-xs font-bold">VIP
                Tables</a>
        </div>
    </section>
    <section id="clubs" class="py-24 bg-black relative">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-serif mb-12 text-center">Exclusive Venues</h2>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="group cursor-pointer">
                    <div class="aspect-[3/4] bg-surface relative overflow-hidden mb-4 rounded">
                        <img src="https://images.unsplash.com/photo-1574391884720-77c76b39ce3a?q=80&w=1974&auto=format&fit=crop"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <div class="text-xs text-primary uppercase tracking-widest mb-1">Tulum</div>
                    <h3 class="font-serif text-xl">Bonbonniere</h3>
                    <div class="text-slate-500 text-sm mt-1">Min. Spend: $2,000</div>
                </div>
                <div class="group cursor-pointer">
                    <div class="aspect-[3/4] bg-surface relative overflow-hidden mb-4 rounded">
                        <img src="https://images.unsplash.com/photo-1545128485-c400e7702796?q=80&w=2070&auto=format&fit=crop"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <div class="text-xs text-primary uppercase tracking-widest mb-1">Cancun</div>
                    <h3 class="font-serif text-xl">The City VIP</h3>
                    <div class="text-slate-500 text-sm mt-1">Min. Spend: $1,500</div>
                </div>
                <div class="group cursor-pointer">
                    <div class="aspect-[3/4] bg-surface relative overflow-hidden mb-4 rounded">
                        <img src="https://images.unsplash.com/photo-1514525253440-b393452e8d26?q=80&w=1974&auto=format&fit=crop"
                            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    </div>
                    <div class="text-xs text-primary uppercase tracking-widest mb-1">Playa del Carmen</div>
                    <h3 class="font-serif text-xl">Coralina Daylight</h3>
                    <div class="text-slate-500 text-sm mt-1">Min. Spend: $1,000</div>
                </div>
            </div>
        </div>
    </section>
    <div id="lumiere-widget" class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
        <div id="chat-container"
            class="hidden w-[350px] md:w-[400px] h-[600px] bg-black/90 backdrop-blur-xl border border-primary/30 rounded-2xl shadow-2xl overflow-hidden flex flex-col transition-all duration-300 transform origin-bottom-right scale-90 opacity-0 mb-4">
            <div
                class="h-16 bg-gradient-to-r from-surface to-black border-b border-white/10 flex items-center px-6 gap-4">
                <div class="relative">
                    <div
                        class="w-10 h-10 rounded-full border border-primary/50 flex items-center justify-center overflow-hidden">
                        <img src="https://api.dicebear.com/7.x/micah/svg?seed=Jax&backgroundColor=transparent"
                            class="w-full h-full bg-surface">
                    </div>
                    <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-black rounded-full">
                    </div>
                </div>
                <div>
                    <div class="font-serif font-medium text-white">Jax</div>
                    <div class="text-[10px] text-primary tracking-widest uppercase">VIP Host</div>
                </div>
            </div>
            <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-4"></div>
            <div class="p-4 bg-surface border-t border-white/10">
                <div
                    class="relative flex items-center bg-black border border-white/10 rounded-full px-4 py-2 focus-within:border-primary/50 transition-colors">
                    <input type="text" id="chat-input" placeholder="Ask about tables..."
                        class="bg-transparent border-none outline-none text-sm text-white w-full mr-2 placeholder:text-slate-600">
                    <button id="chat-send-btn"
                        class="text-primary hover:text-white transition-colors p-1 transform rotate-45"><i
                            class="fas fa-paper-plane"></i></button>
                    <!-- Hidden elements required by JS -->
                    <button id="chat-voice-btn" class="hidden"></button>
                    <button id="chat-image-btn" class="hidden"></button>
                    <button id="chat-mic-btn" class="hidden"></button>
                    <input type="file" id="chat-file-input" class="hidden">
                </div>
                <div class="text-[9px] text-center text-slate-600 mt-2">Powered by Lumière AI</div>
            </div>
        </div>
        <button id="chat-toggle-btn"
            class="group relative w-16 h-16 bg-black border border-primary rounded-full shadow-[0_0_20px_rgba(168,85,247,0.4)] flex items-center justify-center hover:scale-110 transition-transform duration-300">
            <i class="fas fa-martini-glass-citrus text-primary text-2xl group-hover:text-white transition-colors"></i>
        </button>
    </div>
    <script>
        window.LUMIERE_CONFIG = {
            name: "Jax",
            role: "VIP Host",
            identity: "You are JAX, the ultimate nightlife connector for Nocturne VIP in Tulum and Cancun.",
            personality: "Energetic, cool, uses slang ('Got you covered', 'Vibe is crazy'), confident.",
            goal: "Book VIP tables and bottle service packages.",
            inventory: "- Bonbonniere Table ($2k Min) \n- The City VIP ($1.5k Min) \n- Coralina Daybed ($1k Min)",
            color: "#a855f7",
            welcome: "Yo! Jax here. Looking for a chill vibe or a crazy night out? I can get you the best tables in Tulum.",
            voice_keywords: ["male", "energetic"]
        };
    </script>
    <script type="module" src="js/demo-chat.js"></script>
</body>

</html>
