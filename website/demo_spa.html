<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenity Haven | Luxury Day Spa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Lumiere Config -->
    <script>
        window.LUMIERE_CONFIG = {
            agent: {
                name: "Serena",
                role: "Wellness Coordinator",
                identity: "expert therapist and relaxation guide for Serenity Haven",
                personality: "calm, soft-spoken, nurturing, and mindful",
                goal: "book relaxing treatments, customize spa days, and ensure tranquility",
                inventory: [
                    { id: 'massage_aromatherapy', name: 'Aromatherapy Massage', price: '$140 (60m)', description: 'Gentle pressure with essential oils' },
                    { id: 'facial_glow', name: 'Radiance Facial', price: '$120', description: 'Deep cleansing and vitamin C infusion' },
                    { id: 'couples_retreat', name: 'Couples Retreat', price: '$350', description: 'Side-by-side massage and private jacuzzi' }
                ],
                color: '#7e22ce', // Purple 700 (Lavender-ish vibe in UI)
                welcome: "Namaste. I am Serena. Welcome to your sanctuary of peace. How may I help you find tranquility today?",
                voice_keywords: ["peaceful", "calm", "soothing", "gentle"]
            }
        };
    </script>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .bg-soft-lavender {
            background-color: #f3f0ff;
            /* Purple 50 */
        }

        .text-deep-lavender {
            color: #581c87;
            /* Purple 900 */
        }

        .chat-widget-open {
            box-shadow: 0 0 50px rgba(126, 34, 206, 0.2);
            /* Purple shadow */
        }
    </style>
</head>

<body class="bg-soft-lavender text-slate-800 selection:bg-purple-200 selection:text-purple-900">

    <!-- Nav -->
    <nav class="fixed w-full z-50 transition-all duration-300 bg-white/70 backdrop-blur-md border-b border-purple-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-spa text-purple-500 text-xl"></i>
                    <span class="text-2xl font-serif tracking-in-expand font-bold text-deep-lavender">Serenity
                        Haven</span>
                </div>

                <div class="hidden md:flex items-center space-x-8">
                    <a href="#"
                        class="text-sm font-light text-slate-600 hover:text-purple-600 transition">Treatments</a>
                    <a href="#" class="text-sm font-light text-slate-600 hover:text-purple-600 transition">Packages</a>
                    <a href="#"
                        class="text-sm font-light text-slate-600 hover:text-purple-600 transition">Membership</a>
                    <a href="dashboard.html?industry=spa" target="_blank"
                        class="px-5 py-2 glass-panel rounded-full text-xs font-medium hover:bg-white/90 transition border border-purple-200 text-purple-800">
                        <i class="fas fa-chart-line mr-2"></i>Owner Dashboard
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <!-- Background -->
        <div class="absolute inset-0 z-0">
            <!-- Calm Spa Background -->
            <img src="https://images.unsplash.com/photo-1540555700478-4be289fbecef?q=80&w=2070&auto=format&fit=crop"
                alt="Luxury Spa" class="w-full h-full object-cover opacity-90">
            <div class="absolute inset-0 bg-gradient-to-t from-white/40 via-purple-500/10 to-transparent"></div>
        </div>

        <div class="relative z-10 text-center px-4 max-w-4xl mx-auto mt-20">
            <span
                class="inline-block py-1 px-3 rounded-full bg-white/60 border border-purple-200 text-purple-800 text-xs tracking-[0.2em] uppercase mb-6 backdrop-blur-sm shadow-sm">
                Escape The Ordinary
            </span>
            <h1 class="text-5xl md:text-7xl font-serif text-deep-lavender mb-8 leading-tight">
                Restore Your <br>
                <span class="font-light italic text-purple-600">Mind & Body</span>
            </h1>
            <p class="text-xl text-slate-700 font-light mb-12 max-w-2xl mx-auto">
                Step into a world of pure relaxation. Let us guide you to serenity.
            </p>

            <div class="flex flex-col md:flex-row items-center justify-center space-y-4 md:space-y-0 md:space-x-6">
                <!-- Trigger AI -->
                <button onclick="document.querySelector('.chat-trigger-btn').click()"
                    class="px-8 py-4 bg-purple-600 rounded-full text-white font-medium hover:bg-purple-700 hover:scale-105 transition-all shadow-[0_10px_30px_rgba(147,51,234,0.3)] flex items-center group">
                    <span>Book Relaxation</span>
                    <i class="fas fa-arrow-right ml-3 group-hover:translate-x-1 transition-transform"></i>
                </button>

                <a href="#services"
                    class="px-8 py-4 glass-panel rounded-full text-purple-900 hover:bg-white/80 transition-all flex items-center shadow-sm">
                    <i class="fas fa-leaf mr-2 text-purple-500"></i> View Treatments
                </a>
            </div>
        </div>
    </section>

    <!-- Chat Interface -->
    <div id="lumiere-root"></div>
    <script src="js/demo-chat.js"></script>

    <!-- Footer -->
    <footer class="bg-white border-t border-purple-100 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-400 text-sm">Powered by Lumière AI Concierge</p>
        </div>
    </footer>

</body>

</html>
