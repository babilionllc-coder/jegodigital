name: Deploy to Firebase

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# --------------------------------------------------------------
# Disaster 2026-04-22 PM commit 27132638: run #78 (push) + run #79
# (workflow_dispatch) both fired for the same commit and both tried
# to deploy BATCH 1 (~30 functions) in parallel → 60 simultaneous
# updates hit the GCF 60-per-100s quota → run #78 BATCH 1 failed
# with the generic "health check failure" on 16 functions.
#
# Fix: serialize deploys on main. Any new run cancels the in-flight
# one, so we never have two BATCH 1's racing for the same quota.
# --------------------------------------------------------------
concurrency:
  group: deploy-firebase-main
  cancel-in-progress: true

jobs:
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install function dependencies
        run: cd website/functions && npm install

      - name: Create .env file
        run: |
          cd website/functions
          cat > .env << 'ENVEOF'
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL=${{ secrets.BREVO_SENDER_EMAIL }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY=${{ secrets.PERPLEXITY_API_KEY }}
          SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}
          FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }}
          DATAFORSEO_LOGIN=${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASS=${{ secrets.DATAFORSEO_PASS }}
          PSI_API_KEY=${{ secrets.PSI_API_KEY }}
          HUNTER_API_KEY=${{ secrets.HUNTER_API_KEY }}
          ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
          CALENDLY_PAT=${{ secrets.CALENDLY_PAT }}
          CALENDLY_EVENT_TYPE_URI=${{ secrets.CALENDLY_EVENT_TYPE_URI }}
          ALEX_EMAIL=${{ secrets.ALEX_EMAIL }}
          TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM=${{ secrets.TWILIO_FROM }}
          MOCKUP_RENDERER_URL=${{ secrets.MOCKUP_RENDERER_URL }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          BREVO_SENDER_NAME=${{ secrets.BREVO_SENDER_NAME }}
          PAGESPEED_API_KEY=${{ secrets.PAGESPEED_API_KEY }}
          SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WORKFLOW_TOKEN=${{ secrets.SLACK_WORKFLOW_TOKEN }}
          INSTANTLY_API_KEY=${{ secrets.INSTANTLY_API_KEY }}
          IG_GRAPH_TOKEN=${{ secrets.IG_GRAPH_TOKEN }}
          MANYCHAT_API_KEY=${{ secrets.MANYCHAT_API_KEY }}
          ALEX_PERSONAL_PHONE=${{ secrets.ALEX_PERSONAL_PHONE }}
          SEED_SECRET=${{ secrets.SEED_SECRET }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          APIFY_API_KEY=${{ secrets.APIFY_API_KEY }}
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
          JEGODIGITAL_PLACE_ID=ChIJY8hblznTcwkRQz9LPstXY5o
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          REDDIT_CLIENT_ID=${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET=${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME=${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD=${{ secrets.REDDIT_PASSWORD }}
          REDDIT_USER_AGENT=${{ secrets.REDDIT_USER_AGENT }}
          NOTION_API_KEY=${{ secrets.NOTION_API_KEY }}
          NOTION_LEADS_CRM_ID=${{ secrets.NOTION_LEADS_CRM_ID }}
          NOTION_SESSION_LOG_PAGE_ID=${{ secrets.NOTION_SESSION_LOG_PAGE_ID }}
          ADMIN_TRIGGER_TOKEN=${{ secrets.ADMIN_TRIGGER_TOKEN }}
          GH_PAT=${{ secrets.GH_PAT }}
          SLACK_CHANNEL_ALERTS=${{ secrets.SLACK_CHANNEL_ALERTS }}
          SLACK_CHANNEL_LEADS_HOT=${{ secrets.SLACK_CHANNEL_LEADS_HOT }}
          SLACK_CHANNEL_REVENUE=${{ secrets.SLACK_CHANNEL_REVENUE }}
          SLACK_CHANNEL_DAILY_OPS=${{ secrets.SLACK_CHANNEL_DAILY_OPS }}
          SLACK_CHANNEL_CONTENT=${{ secrets.SLACK_CHANNEL_CONTENT }}
          SLACK_CHANNEL_COLD_CALL_LOG=${{ secrets.SLACK_CHANNEL_COLD_CALL_LOG }}
          SLACK_CHANNEL_ALL_JEGODIGITAL=${{ secrets.SLACK_CHANNEL_ALL_JEGODIGITAL }}
          TIKTOK_CLIENT_KEY=${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET=${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_SANDBOX_CLIENT_KEY=${{ secrets.TIKTOK_SANDBOX_CLIENT_KEY }}
          TIKTOK_SANDBOX_CLIENT_SECRET=${{ secrets.TIKTOK_SANDBOX_CLIENT_SECRET }}
          FB_USER_TOKEN=${{ secrets.FB_USER_TOKEN }}
          FB_AD_ACCOUNT_ID=${{ secrets.FB_AD_ACCOUNT_ID }}
          FB_BUSINESS_ID=${{ secrets.FB_BUSINESS_ID }}
          FB_APP_ID=${{ secrets.FB_APP_ID }}
          ENVEOF
          # Clean leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' .env

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # --------------------------------------------------------------
      # BATCH SPLIT — avoid GCF "60 function updates per 100s" quota
      # --------------------------------------------------------------
      # Disaster 2026-04-22: 6 functions (dailyDigest, coldCallRun,
      # coldCallMidBatchCheck, coldCallRunAfternoon, contentPublisher,
      # sofiaConversationAudit) hit "Quota Exceeded" on a single-batch
      # deploy of 60+ functions. Firebase CLI retries 3x then reports
      # "Function deployment failed due to a health check failure" —
      # a misleading generic error. True cause = GCF deploy-rate
      # throttling.
      #
      # Fix: auto-discover exports from index.js, split alphabetically
      # into two halves, deploy each with --only, pause 120s between
      # (quota window is 100s — 120s gives headroom).
      # --------------------------------------------------------------
      # --------------------------------------------------------------
      # Disaster 2026-04-22 PM run #85: naive `grep -oE '^exports\.'`
      # caught `exports.scheduledCampaign` on line 204 which lives INSIDE
      # a /* ... */ block comment. Firebase never registered the function
      # so `--only functions:scheduledCampaign` threw:
      #   "Error: No function matches the filter: default:scheduledCampaign"
      # killing BATCH 2 and forcing the retry step to fail the job.
      #
      # Fix: strip /* ... */ block comments with perl BEFORE grepping.
      # Perl's `-0777` reads the whole file, `s|/\*.*?\*/||gs` nukes every
      # block comment (`.*?` lazy so it doesn't eat across blocks).
      # Single-line `// exports.X` comments are already filtered because
      # they don't start with `exports.` at column 0.
      # --------------------------------------------------------------
      - name: Build batched --only flags from index.js exports
        id: exports
        run: |
          cd website/functions
          perl -0777 -pe 's|/\*.*?\*/||gs' index.js \
            | grep -oE '^exports\.[a-zA-Z_][a-zA-Z0-9_]*' \
            | sed 's/exports\.//' \
            | sort -u > /tmp/fn_list.txt
          TOTAL=$(wc -l < /tmp/fn_list.txt)
          HALF=$(( (TOTAL + 1) / 2 ))
          head -n "$HALF" /tmp/fn_list.txt > /tmp/fn_batch1.txt
          tail -n +"$((HALF + 1))" /tmp/fn_list.txt > /tmp/fn_batch2.txt
          B1=$(paste -sd, /tmp/fn_batch1.txt | sed 's/^/functions:/;s/,/,functions:/g')
          B2=$(paste -sd, /tmp/fn_batch2.txt | sed 's/^/functions:/;s/,/,functions:/g')
          echo "TOTAL=$TOTAL  BATCH1=$(wc -l < /tmp/fn_batch1.txt)  BATCH2=$(wc -l < /tmp/fn_batch2.txt)"
          {
            echo "batch1<<EOF"
            echo "$B1"
            echo "EOF"
            echo "batch2<<EOF"
            echo "$B2"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Disaster 2026-04-22 PM run #82: 40 of 41 BATCH 1 functions deployed green
      # but one (coldEmailDailyReport) hit a transient GCF health-check flake. The
      # CLI exits non-zero → BATCH 2 gets skipped → 41 more functions go unshipped.
      # Fix: `continue-on-error: true` on BATCH 1 so a single flake doesn't strand
      # BATCH 2. The retry step at the end re-attempts any individual functions
      # that failed, and only the very last step fails the job if retries don't heal.
      - name: Deploy Functions BATCH 1
        id: batch1
        continue-on-error: true
        run: firebase deploy --only "${{ steps.exports.outputs.batch1 }}" --force --token "$FIREBASE_TOKEN" --project jegodigital-e02fb
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Wait 120s for GCF deploy-rate quota window to reset
        run: sleep 120

      - name: Deploy Functions BATCH 2
        id: batch2
        continue-on-error: true
        run: firebase deploy --only "${{ steps.exports.outputs.batch2 }}" --force --token "$FIREBASE_TOKEN" --project jegodigital-e02fb
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # If either BATCH 1 or BATCH 2 had a transient flake, wait out the quota
      # window once more and retry the FULL set. 99% of failures from this point
      # are single-function GCF health-check flakes that self-heal on re-deploy.
      #
      # 2026-04-25 PM: Added continue-on-error so a couple persistent broken
      # functions (e.g. instantlyReplySyncOnDemand, notionLeadSyncCron hitting
      # GCF Quota Exceeded) don't block the IAM grant step from running. Those
      # 2 functions have been broken for days — they're tech debt to fix
      # separately, not a reason to leave 24 new HTTP functions 403'd.
      - name: Retry failed batches (waits 120s first)
        id: retry
        continue-on-error: true
        if: steps.batch1.outcome == 'failure' || steps.batch2.outcome == 'failure'
        run: |
          echo "Retrying after batch1=${{ steps.batch1.outcome }} batch2=${{ steps.batch2.outcome }}"
          sleep 120
          if [ "${{ steps.batch1.outcome }}" = "failure" ]; then
            firebase deploy --only "${{ steps.exports.outputs.batch1 }}" --force --token "$FIREBASE_TOKEN" --project jegodigital-e02fb || echo "  batch1 retry partial failure — continuing to IAM grant anyway"
          fi
          if [ "${{ steps.batch2.outcome }}" = "failure" ]; then
            sleep 120
            firebase deploy --only "${{ steps.exports.outputs.batch2 }}" --force --token "$FIREBASE_TOKEN" --project jegodigital-e02fb || echo "  batch2 retry partial failure — continuing to IAM grant anyway"
          fi
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # --------------------------------------------------------------
      # IAM FIX — grant allUsers invoker on all HTTPS Cloud Functions
      # --------------------------------------------------------------
      # Disaster 2026-04-23: Firebase Functions v4 auto-deploys NEW HTTPS
      # functions as Cloud Run gen2 which is PRIVATE by default. Old gen1
      # functions (submitAuditRequest etc.) remain public. Result: new
      # notionLeadSyncBackfill / notionLeadSyncUpsert / dailyTaskDigestNow
      # returned HTTP 403 Forbidden until we bound allUsers as invoker.
      #
      # Fix: after deploy, auth with GCP_SA_KEY and loop all gen2 services
      # in us-central1 granting allUsers roles/run.invoker. Idempotent —
      # safe to re-run. Covers both current + future HTTPS functions.
      #
      # 2026-04-25 PM: All IAM steps now use `if: always() && batch1==success`
      # so they run REGARDLESS of retry-step exit code. As long as BATCH 1
      # OR BATCH 2 succeeded (most functions deployed), we want to grant
      # IAM on what IS deployed. Otherwise the new HTTP-callable functions
      # stay 403 because of unrelated broken pre-existing functions.
      # --------------------------------------------------------------
      - name: Auth gcloud for IAM fix
        if: always() && (steps.batch1.outcome == 'success' || steps.batch2.outcome == 'success')
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install gcloud CLI
        if: always() && (steps.batch1.outcome == 'success' || steps.batch2.outcome == 'success')
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: jegodigital-e02fb

      - name: Grant allUsers invoker on all Cloud Run services (gen2 public fix)
        if: always() && (steps.batch1.outcome == 'success' || steps.batch2.outcome == 'success')
        continue-on-error: true
        run: |
          echo "=== Listing all Cloud Run services in us-central1 ==="
          gcloud run services list --region=us-central1 --format='value(metadata.name)' > /tmp/cr_services.txt
          COUNT=$(wc -l < /tmp/cr_services.txt)
          echo "Found $COUNT Cloud Run services"
          while IFS= read -r svc; do
            [ -z "$svc" ] && continue
            echo "Granting allUsers invoker on: $svc"
            gcloud run services add-iam-policy-binding "$svc" \
              --region=us-central1 \
              --member=allUsers \
              --role=roles/run.invoker \
              --quiet 2>&1 | tail -2 || echo "  (skipped — already set or error)"
          done < /tmp/cr_services.txt
          echo "=== IAM binding pass complete ==="

      # 2026-04-25: Firebase Functions v4 with Node 20 deploys as Cloud Functions
      # Gen 1 (NOT gen2/Cloud Run). The previous step targets ONLY gen2 services,
      # so new gen1 HTTP functions stayed PRIVATE (returning 403 Forbidden) for
      # weeks. Symptoms: dailyTiktokViralScriptOnDemand, dailyTaskDigestNow,
      # creditWatchdogsOnDemand, contentEveningWrapNow all returned 403.
      # Fix: also grant public invoker on every gen1 HTTPS function.
      - name: Grant allUsers invoker on all Cloud Functions Gen1 services (public fix)
        if: always() && (steps.batch1.outcome == 'success' || steps.batch2.outcome == 'success')
        continue-on-error: true
        run: |
          echo "=== Listing all Cloud Functions Gen1 in us-central1 ==="
          gcloud functions list --regions=us-central1 --format='value(name)' \
            --filter='environment=GEN_1' > /tmp/cf_gen1.txt 2>/dev/null || true
          # Fallback to any function if filter syntax unsupported
          if [ ! -s /tmp/cf_gen1.txt ]; then
            gcloud functions list --regions=us-central1 --format='value(name)' > /tmp/cf_gen1.txt
          fi
          COUNT=$(wc -l < /tmp/cf_gen1.txt)
          echo "Found $COUNT Cloud Functions"
          while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            # Strip the projects/.../locations/.../functions/ prefix if present
            FNNAME=$(echo "$fn" | sed 's|.*/||')
            echo "Granting allUsers invoker on gen1 function: $FNNAME"
            gcloud functions add-iam-policy-binding "$FNNAME" \
              --region=us-central1 \
              --member=allUsers \
              --role=roles/cloudfunctions.invoker \
              --quiet 2>&1 | tail -2 || echo "  (skipped — already set or error)"
          done < /tmp/cf_gen1.txt
          echo "=== Gen1 IAM binding pass complete ==="

  deploy-hosting:
    name: Deploy Hosting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Deploy Hosting
        run: |
          # Strip hosting.predeploy cleanly so CI doesn't try to run the local
          # predeploy scripts (verify-videos.sh, auto-backup-videos.sh, npm run
          # build). Using jq avoids the trailing-comma bug that broke deploys
          # from 2026-04-17 — the old `sed -i '/"predeploy"/,/\]/d'` removed the
          # predeploy block but left `],` dangling before `}` in firebase.json,
          # producing "Trailing comma in object at 623:5".
          jq 'if .hosting then .hosting |= del(.predeploy) else . end' firebase.json > firebase.json.tmp
          mv firebase.json.tmp firebase.json
          jq empty firebase.json
          firebase deploy --only hosting --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
