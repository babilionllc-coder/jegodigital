name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'website/functions/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install function dependencies
        run: cd website/functions && npm install

      - name: Create .env file
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASS: ${{ secrets.DATAFORSEO_PASS }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          CALENDLY_PAT: ${{ secrets.CALENDLY_PAT }}
          CALENDLY_EVENT_TYPE_URI: ${{ secrets.CALENDLY_EVENT_TYPE_URI }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: |
          cd website/functions
          env | grep -E '^(DATAFORSEO|PERPLEXITY|SERPAPI|HUNTER|GEMINI|PSI|ELEVENLABS|BREVO|CALENDLY|TWILIO|FIRECRAWL)' > .env
          echo "BREVO_SENDER_EMAIL=info@jegodigital.com" >> .env
          echo "ALEX_EMAIL=jegoalexdigital@gmail.com" >> .env

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Functions to Firebase
        run: firebase deploy --only functions --force --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
