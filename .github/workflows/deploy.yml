name: Deploy to Firebase

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install function dependencies
        run: cd website/functions && npm install

      - name: Create .env file
        run: |
          cd website/functions
          cat > .env << 'ENVEOF'
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL=${{ secrets.BREVO_SENDER_EMAIL }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY=${{ secrets.PERPLEXITY_API_KEY }}
          SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}
          FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }}
          DATAFORSEO_LOGIN=${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASS=${{ secrets.DATAFORSEO_PASS }}
          PSI_API_KEY=${{ secrets.PSI_API_KEY }}
          HUNTER_API_KEY=${{ secrets.HUNTER_API_KEY }}
          ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
          CALENDLY_PAT=${{ secrets.CALENDLY_PAT }}
          CALENDLY_EVENT_TYPE_URI=${{ secrets.CALENDLY_EVENT_TYPE_URI }}
          ALEX_EMAIL=${{ secrets.ALEX_EMAIL }}
          TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM=${{ secrets.TWILIO_FROM }}
          MOCKUP_RENDERER_URL=${{ secrets.MOCKUP_RENDERER_URL }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          BREVO_SENDER_NAME=${{ secrets.BREVO_SENDER_NAME }}
          PAGESPEED_API_KEY=${{ secrets.PAGESPEED_API_KEY }}
          SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN=${{ secrets.SLACK_BOT_TOKEN }}
          INSTANTLY_API_KEY=${{ secrets.INSTANTLY_API_KEY }}
          IG_GRAPH_TOKEN=${{ secrets.IG_GRAPH_TOKEN }}
          MANYCHAT_API_KEY=${{ secrets.MANYCHAT_API_KEY }}
          ALEX_PERSONAL_PHONE=${{ secrets.ALEX_PERSONAL_PHONE }}
          SEED_SECRET=${{ secrets.SEED_SECRET }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          ENVEOF
          # Clean leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' .env

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # --------------------------------------------------------------
      # BATCH SPLIT — avoid GCF "60 function updates per 100s" quota
      # --------------------------------------------------------------
      # Disaster 2026-04-22: 6 functions (dailyDigest, coldCallRun,
      # coldCallMidBatchCheck, coldCallRunAfternoon, contentPublisher,
      # sofiaConversationAudit) hit "Quota Exceeded" on a single-batch
      # deploy of 60+ functions. Firebase CLI retries 3x then reports
      # "Function deployment failed due to a health check failure" —
      # a misleading generic error. True cause = GCF deploy-rate
      # throttling.
      #
      # Fix: auto-discover exports from index.js, split alphabetically
      # into two halves, deploy each with --only, pause 120s between
      # (quota window is 100s — 120s gives headroom).
      # --------------------------------------------------------------
      - name: Build batched --only flags from index.js exports
        id: exports
        run: |
          cd website/functions
          grep -oE '^exports\.[a-zA-Z_][a-zA-Z0-9_]*' index.js \
            | sed 's/exports\.//' \
            | sort -u > /tmp/fn_list.txt
          TOTAL=$(wc -l < /tmp/fn_list.txt)
          HALF=$(( (TOTAL + 1) / 2 ))
          head -n "$HALF" /tmp/fn_list.txt > /tmp/fn_batch1.txt
          tail -n +"$((HALF + 1))" /tmp/fn_list.txt > /tmp/fn_batch2.txt
          B1=$(paste -sd, /tmp/fn_batch1.txt | sed 's/^/functions:/;s/,/,functions:/g')
          B2=$(paste -sd, /tmp/fn_batch2.txt | sed 's/^/functions:/;s/,/,functions:/g')
          echo "TOTAL=$TOTAL  BATCH1=$(wc -l < /tmp/fn_batch1.txt)  BATCH2=$(wc -l < /tmp/fn_batch2.txt)"
          {
            echo "batch1<<EOF"
            echo "$B1"
            echo "EOF"
            echo "batch2<<EOF"
            echo "$B2"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy Functions BATCH 1
        run: firebase deploy --only "${{ steps.exports.outputs.batch1 }}" --force --token "$FIREBASE_TOKEN" --project jegodigital-e02fb
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Wait 120s for GCF deploy-rate quota window to reset
        run: sleep 120

      - name: Deploy Functions BATCH 2
        run: firebase deploy --only "${{ steps.exports.outputs.batch2 }}" --force --token "$FIREBASE_TOKEN" --project jegodigital-e02fb
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  deploy-hosting:
    name: Deploy Hosting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Deploy Hosting
        run: |
          # Strip hosting.predeploy cleanly so CI doesn't try to run the local
          # predeploy scripts (verify-videos.sh, auto-backup-videos.sh, npm run
          # build). Using jq avoids the trailing-comma bug that broke deploys
          # from 2026-04-17 — the old `sed -i '/"predeploy"/,/\]/d'` removed the
          # predeploy block but left `],` dangling before `}` in firebase.json,
          # producing "Trailing comma in object at 623:5".
          jq 'if .hosting then .hosting |= del(.predeploy) else . end' firebase.json > firebase.json.tmp
          mv firebase.json.tmp firebase.json
          jq empty firebase.json
          firebase deploy --only hosting --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
