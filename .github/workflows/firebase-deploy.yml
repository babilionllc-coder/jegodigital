name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Functions dependencies
        run: cd website/functions && npm install

      - name: Create .env for Functions
        run: |
          cat > website/functions/.env << EOL
          DATAFORSEO_LOGIN=${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASS=${{ secrets.DATAFORSEO_PASS }}
          PERPLEXITY_API_KEY=${{ secrets.PERPLEXITY_API_KEY }}
          SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}
          HUNTER_API_KEY=${{ secrets.HUNTER_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          PSI_API_KEY=${{ secrets.PSI_API_KEY }}
          ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL=${{ secrets.BREVO_SENDER_EMAIL }}
          CALENDLY_PAT=${{ secrets.CALENDLY_PAT }}
          CALENDLY_EVENT_TYPE_URI=${{ secrets.CALENDLY_EVENT_TYPE_URI }}
          TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM=${{ secrets.TWILIO_FROM }}
          ALEX_EMAIL=${{ secrets.ALEX_EMAIL }}
          FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }}
          EOL

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
