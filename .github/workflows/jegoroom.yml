name: JegoRoom (intent detection)

# Phase 1 MVP — collects hiring signals + scores accounts.
# Phases 2+ add GMaps reviews, launch news, LinkedIn posts.
#
# Crons (all in UTC — CDMX is UTC-6):
#   09:00 CDMX = 15:00 UTC — hiring collector
#   11:00 CDMX = 17:00 UTC — scoring engine pass 1
#   15:00 CDMX = 21:00 UTC — scoring engine pass 2 (catches late writes)
#
# Manual: workflow_dispatch lets you run either job on demand.

on:
  schedule:
    - cron: "0 15 * * *"  # 09:00 CDMX — hiring collector
    - cron: "0 17 * * *"  # 11:00 CDMX — scoring pass 1
    - cron: "0 21 * * *"  # 15:00 CDMX — scoring pass 2
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: true
        default: "scoring"
        type: choice
        options:
          - hiring
          - scoring
          - both
      dry_run:
        description: "Dry run (don't write to Firestore)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  hiring:
    # Runs at 15:00 UTC (scheduled) OR when manually triggered with job=hiring|both
    if: |
      github.event_name == 'schedule' && github.event.schedule == '0 15 * * *' ||
      github.event_name == 'workflow_dispatch' && (inputs.job == 'hiring' || inputs.job == 'both')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install requests firebase-admin

      - name: Run hiring collector
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          FIREBASE_ADMIN_SA_JSON: ${{ secrets.FIREBASE_ADMIN_SA_JSON }}
        run: |
          set -e
          FLAGS=""
          if [ "${{ inputs.dry_run }}" == "true" ]; then FLAGS="--dry-run"; fi
          python3 tools/jegoroom/collect_hiring.py $FLAGS

      - name: Telegram summary
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          ICON="✅"
          if [ "$STATUS" != "success" ]; then ICON="🔴"; fi
          MSG="$ICON JegoRoom hiring collector: $STATUS"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}%0A${RUN_URL}" || echo "tg post failed"

  scoring:
    # Runs at 17:00 UTC, 21:00 UTC, OR manual job=scoring|both
    if: |
      (github.event_name == 'schedule' && (github.event.schedule == '0 17 * * *' || github.event.schedule == '0 21 * * *')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'scoring' || inputs.job == 'both'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install requests firebase-admin

      - name: Run scoring engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_ADMIN_SA_JSON: ${{ secrets.FIREBASE_ADMIN_SA_JSON }}
        run: |
          set -e
          FLAGS="--limit 200"
          if [ "${{ inputs.dry_run }}" == "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          python3 tools/jegoroom/score_accounts.py $FLAGS

      - name: Telegram summary
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          ICON="✅"
          if [ "$STATUS" != "success" ]; then ICON="🔴"; fi
          MSG="$ICON JegoRoom scoring engine: $STATUS"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}%0A${RUN_URL}" || echo "tg post failed"
